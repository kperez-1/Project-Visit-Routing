<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --accent: #00d4aa;
    --accent2: #ff6b35;
    --accent3: #7c3aed;
    --text: #e6edf3;
    --muted: #8b949e;
    --customer: #00d4aa;
    --prospect: #ff6b35;
    --notype: #7c3aed;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 1000;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  .stats {
    display: flex;
    gap: 16px;
  }

  .stat {
    text-align: right;
    font-family: 'DM Mono', monospace;
  }

  .stat-num {
    font-size: 20px;
    font-weight: 500;
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  .controls {
    padding: 8px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-family: 'DM Mono', monospace;
    margin-right: 4px;
  }

  .filter-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--text); color: var(--text); }
  .filter-btn.active-all { border-color: var(--text); color: var(--text); background: rgba(255,255,255,0.05); }
  .filter-btn.active-customer { border-color: var(--customer); color: var(--customer); background: rgba(0,212,170,0.08); }
  .filter-btn.active-prospect { border-color: var(--prospect); color: var(--prospect); background: rgba(255,107,53,0.08); }
  .filter-btn.active-notype { border-color: var(--notype); color: var(--notype); background: rgba(124,58,237,0.08); }

  .divider { width: 1px; height: 20px; background: var(--border); }

  .search-wrap {
    margin-left: auto;
    position: relative;
  }

  #search {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 5px 10px 5px 28px;
    width: 200px;
    outline: none;
    transition: border-color 0.15s;
  }

  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 8px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 12px;
    pointer-events: none;
  }

  #map {
    flex: 1;
    width: 100%;
  }

  /* Cluster overrides */
  .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
    background: rgba(0, 212, 170, 0.15) !important;
  }
  .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
    background: rgba(0, 212, 170, 0.6) !important;
    color: #0d1117 !important;
    font-family: 'DM Mono', monospace !important;
    font-weight: 500 !important;
    font-size: 13px !important;
  }

  /* Popup styling */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    color: var(--text) !important;
  }

  .leaflet-popup-tip { background: var(--surface) !important; }

  .popup-name {
    font-weight: 700;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 4px;
  }

  .popup-addr {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .popup-type {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'DM Mono', monospace;
  }

  .type-Customer { background: rgba(0,212,170,0.15); color: var(--customer); border: 1px solid rgba(0,212,170,0.3); }
  .type-Prospect { background: rgba(255,107,53,0.15); color: var(--prospect); border: 1px solid rgba(255,107,53,0.3); }
  .type-Other { background: rgba(124,58,237,0.15); color: var(--notype); border: 1px solid rgba(124,58,237,0.3); }

  .zone-badge {
    margin-top: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .legend {
    position: absolute;
    bottom: 20px;
    left: 20px;
    z-index: 999;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 11px;
  }

  .legend-title {
    font-weight: 700;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-item span { color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px; }

  /* Sidebar for zone list */
  .sidebar {
    position: absolute;
    top: 0; right: 0;
    width: 280px;
    height: 100%;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 998;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    padding: 16px;
  }

  .sidebar.open { transform: translateX(0); }

  .sidebar-toggle {
    position: absolute;
    top: 50%;
    right: 0;
    transform: translateY(-50%);
    z-index: 999;
    background: var(--surface);
    border: 1px solid var(--border);
    border-right: none;
    border-radius: 6px 0 0 6px;
    padding: 10px 6px;
    cursor: pointer;
    color: var(--muted);
    font-size: 14px;
    transition: color 0.15s;
  }

  .sidebar-toggle:hover { color: var(--text); }

  .zone-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .zone-card:hover { border-color: var(--accent); }

  .zone-card-title {
    font-weight: 700;
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 3px;
  }

  .zone-card-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .zone-companies {
    margin-top: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    line-height: 1.6;
  }

</style>

<div id="map"></div>

</div>

// Assign zone to each company
function assignZone(lat, lng) {
  let best = null, bestDist = Infinity;
  zones.forEach(z => {
    const d = Math.sqrt((lat-z.lat)**2 + (lng-z.lng)**2);
    if (d < bestDist) { bestDist = d; best = z; }
  });
  return best;
}

companies.forEach(c => { c.zone = assignZone(c.lat, c.lng); });

// ─── MAP INIT ───────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [27.00, -80.25],
  zoom: 9,
  zoomControl: true,
  preferCanvas: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '©OpenStreetMap contributors, ©CARTO',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Draw zone rectangles
const halfLat = 0.036, halfLng = 0.042; // ~2.5 miles each direction
zones.forEach(z => {
  L.rectangle([
    [z.lat - halfLat, z.lng - halfLng],
    [z.lat + halfLat, z.lng + halfLng]
  ], {
    color: z.color,
    weight: 1.5,
    opacity: 0.5,
    fillOpacity: 0.04,
    dashArray: '4 4',
  }).addTo(map).bindTooltip(`<b style="color:${z.color}">${z.id}: ${z.name}</b>`, {sticky:true});
});

// Create marker icon
function makeIcon(type, zoneBg) {
  const colors = { Customer:'#00d4aa', Prospect:'#ff6b35', Other:'#7c3aed' };
  const c = colors[type] || colors.Other;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="24" viewBox="0 0 20 24">
    <ellipse cx="10" cy="22" rx="4" ry="2" fill="rgba(0,0,0,0.3)"/>
    <path d="M10 0 C5 0 1 4 1 9 C1 15 10 22 10 22 C10 22 19 15 19 9 C19 4 15 0 10 0Z" fill="${c}" stroke="rgba(0,0,0,0.4)" stroke-width="1"/>
    <circle cx="10" cy="9" r="4" fill="rgba(0,0,0,0.25)"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [20, 24],
    iconAnchor: [10, 24],
    popupAnchor: [0, -24],
  });
}

// Build markers
const clusterGroup = L.markerClusterGroup({
  maxClusterRadius: 40,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
});

const allMarkers = [];

companies.forEach(c => {
  const typeKey = c.type === 'Customer' ? 'Customer' : c.type === 'Prospect' ? 'Prospect' : 'Other';
  const icon = makeIcon(typeKey);
  const marker = L.marker([c.lat, c.lng], { icon });
  marker.companyData = c;
  marker.companyType = typeKey;

  const typeClass = `type-${typeKey}`;
  marker.bindPopup(`
    <div class="popup-name">${c.name}</div>
    <div class="popup-addr">${c.addr}</div>
    <span class="popup-type ${typeClass}">${c.type || 'Contact'}</span>
    <div class="zone-badge">📍 ${c.zone.id}: ${c.zone.name}</div>
  `, { maxWidth: 260 });

  clusterGroup.addLayer(marker);
  allMarkers.push(marker);
});

map.addLayer(clusterGroup);

// ─── STATS ─────────────────────────────────────────────────────────────
document.getElementById('stat-shown').textContent = companies.length;
document.getElementById('stat-clusters').textContent = zones.length;

// ─── FILTER ────────────────────────────────────────────────────────────
let activeFilter = 'all';
let searchTerm = '';

function updateMarkers() {
  clusterGroup.clearLayers();
  let count = 0;
  allMarkers.forEach(m => {
    const c = m.companyData;
    const matchFilter = activeFilter === 'all' || m.companyType === activeFilter;
    const matchSearch = !searchTerm || c.name.toLowerCase().includes(searchTerm.toLowerCase());
    if (matchFilter && matchSearch) {
      clusterGroup.addLayer(m);
      count++;
    }
  });
  document.getElementById('stat-shown').textContent = count;
}

function filterMarkers(f) {
  activeFilter = f;
  ['all','Customer','Prospect','Other'].forEach(t => {
    const key = t === 'all' ? 'btn-all' : t === 'Customer' ? 'btn-customer' : t === 'Prospect' ? 'btn-prospect' : 'btn-notype';
    const btn = document.getElementById(key);
    if (btn) btn.className = 'filter-btn' + (f === t ? ` active-${t.toLowerCase() === 'other' ? 'notype' : t.toLowerCase()}` : '');
  });
  updateMarkers();
}

function searchMarkers(val) {
  searchTerm = val;
  updateMarkers();
}
