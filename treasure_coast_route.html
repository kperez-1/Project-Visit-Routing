<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATPB – Treasure Coast Site Tour</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
  :root {
    --steel: #1a2332;
    --steel-mid: #243044;
    --steel-light: #2e3d54;
    --amber: #f5a623;
    --amber-dim: #c47d0e;
    --cyan: #38bdf8;
    --green: #4ade80;
    --red: #f87171;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --border: rgba(255,255,255,0.08);
    --day1: #f5a623;
    --day2: #38bdf8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--steel);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    background: var(--steel-mid);
    border-bottom: 2px solid var(--amber);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    z-index: 1000;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--amber);
    text-transform: uppercase;
  }
  .header-divider { width: 2px; height: 28px; background: var(--border); }
  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .header-stats {
    margin-left: auto;
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .stat { text-align: center; }
  .stat-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--amber);
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .day-toggle {
    display: flex;
    gap: 6px;
  }
  .day-btn {
    padding: 6px 14px;
    border: none;
    border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    opacity: 0.5;
  }
  .day-btn.active { opacity: 1; }
  .day-btn.d1 { background: var(--day1); color: #1a1a1a; }
  .day-btn.d2 { background: var(--day2); color: #1a1a1a; }
  .day-btn.all { background: var(--steel-light); color: var(--text); border: 1px solid var(--border); }
  .day-btn.all.active { opacity: 1; background: var(--text); color: var(--steel); }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 360px;
    flex-shrink: 0;
    background: var(--steel-mid);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-search {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .search-input {
    width: 100%;
    background: var(--steel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    outline: none;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--amber); }

  .stop-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .stop-list::-webkit-scrollbar { width: 4px; }
  .stop-list::-webkit-scrollbar-track { background: transparent; }
  .stop-list::-webkit-scrollbar-thumb { background: var(--steel-light); border-radius: 2px; }

  .day-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 6px 4px;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .day-header .day-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }
  .day-header .day-line {
    flex: 1; height: 1px; background: var(--border);
  }

  .stop-card {
    background: var(--steel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 5px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 3px solid transparent;
    position: relative;
  }
  .stop-card:hover { background: var(--steel-light); border-color: rgba(255,255,255,0.15); }
  .stop-card.active { background: var(--steel-light); }
  .stop-card.day1 { border-left-color: var(--day1); }
  .stop-card.day2 { border-left-color: var(--day2); }
  .stop-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .stop-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .stop-address {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.3;
  }
  .stop-tags {
    display: flex;
    gap: 4px;
    margin-top: 5px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .tag-contractor { background: rgba(245,166,35,0.15); color: var(--amber); }
  .tag-time { background: rgba(56,189,248,0.15); color: var(--cyan); }
  .tag-multi { background: rgba(74,222,128,0.12); color: var(--green); }

  /* MAP */
  #map {
    flex: 1;
    z-index: 1;
  }

  /* POPUP / DETAIL PANEL */
  .detail-panel {
    position: absolute;
    right: 16px;
    bottom: 16px;
    width: 340px;
    background: var(--steel-mid);
    border: 1px solid var(--border);
    border-radius: 12px;
    z-index: 500;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    display: none;
    overflow: hidden;
  }
  .detail-panel.visible { display: block; }
  .detail-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .detail-stop-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    margin-bottom: 4px;
    display: inline-block;
  }
  .detail-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.1;
    color: var(--text);
    margin-top: 4px;
  }
  .close-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    padding: 0 0 0 8px;
    line-height: 1;
    flex-shrink: 0;
  }
  .close-btn:hover { color: var(--text); }
  .detail-body { padding: 12px 16px 16px; }
  .detail-row {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 12px;
    align-items: flex-start;
  }
  .detail-label {
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 10px;
    width: 80px;
    flex-shrink: 0;
    padding-top: 1px;
  }
  .detail-value {
    color: var(--text);
    flex: 1;
    line-height: 1.4;
  }
  .detail-value.highlight { color: var(--amber); font-weight: 500; }
  .multi-badge {
    display: inline-block;
    background: rgba(74,222,128,0.15);
    color: var(--green);
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 600;
    margin-top: 6px;
  }
  .project-list { margin-top: 6px; }
  .project-item {
    background: var(--steel);
    border-radius: 6px;
    padding: 8px 10px;
    margin-bottom: 5px;
    border-left: 2px solid var(--amber);
    font-size: 11px;
  }
  .project-item-name {
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
    font-size: 12px;
  }
  .project-item-detail { color: var(--text-muted); }

  /* Leaflet custom markers */
  .custom-marker {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 2px solid rgba(0,0,0,0.3);
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .custom-marker span { transform: rotate(45deg); }

  .leaflet-popup-content-wrapper {
    background: var(--steel-mid) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5) !important;
  }
  .leaflet-popup-tip { background: var(--steel-mid) !important; }
  .leaflet-popup-content { margin: 10px 14px !important; font-family: 'Barlow', sans-serif !important; }

  @media (max-width: 700px) {
    .sidebar { display: none; }
    .detail-panel { width: calc(100vw - 32px); left: 16px; right: 16px; }
    .header-stats { display: none; }
  }
</style>

// ── MAP INIT ──────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([27.28, -80.45], 9);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  maxZoom: 19
}).addTo(map);

// ── MARKERS ───────────────────────────────────────────────────────────────────
const markerLayer = L.layerGroup().addTo(map);
const markers = {};

function createMarker(stop) {
  const color = stop.day === 1 ? '#f5a623' : '#38bdf8';
  const textColor = '#1a1a1a';
  const isMulti = stop.projects.length > 1;

  const icon = L.divIcon({
    className: '',
    html: `<div style="
      width:32px; height:32px;
      background:${color};
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      border:2px solid rgba(0,0,0,0.35);
      box-shadow:0 3px 10px rgba(0,0,0,0.5);
      display:flex; align-items:center; justify-content:center;
      ${isMulti ? 'border:2px solid white;' : ''}
    ">
      <span style="transform:rotate(45deg); font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:11px; color:${textColor};">${stop.stop}</span>
    </div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 32],
    popupAnchor: [0, -34]
  });

  const m = L.marker([stop.lat, stop.lng], { icon })
    .addTo(markerLayer)
    .on('click', () => showDetail(stop.id));

  markers[stop.id] = m;
}

stops.forEach(createMarker);

// Draw route lines
function drawRoutes() {
  const day1 = stops.filter(s => s.day === 1).sort((a,b) => a.stop - b.stop);
  const day2 = stops.filter(s => s.day === 2).sort((a,b) => a.stop - b.stop);

  L.polyline(day1.map(s => [s.lat, s.lng]), {
    color: '#f5a623', weight: 2.5, opacity: 0.55, dashArray: '6 4'
  }).addTo(map);

  L.polyline(day2.map(s => [s.lat, s.lng]), {
    color: '#38bdf8', weight: 2.5, opacity: 0.55, dashArray: '6 4'
  }).addTo(map);
}
drawRoutes();

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function buildSidebar(filter = 'all', search = '') {
  const list = document.getElementById('stopList');
  list.innerHTML = '';

  const days = filter === 'all' ? [1, 2] : [parseInt(filter)];

  days.forEach(day => {
    const dayStops = stops.filter(s => {
      if (s.day !== day) return false;
      if (!search) return true;
      const q = search.toLowerCase();
      return s.name.toLowerCase().includes(q) ||
        s.projects.some(p => p.title.toLowerCase().includes(q) || (p.contractor||'').toLowerCase().includes(q));
    });

    if (!dayStops.length) return;

    const hdr = document.createElement('div');
    hdr.className = 'day-header';
    hdr.innerHTML = `
      <div class="day-dot" style="background:${day===1?'#f5a623':'#38bdf8'}"></div>
      <span style="color:${day===1?'#f5a623':'#38bdf8'}">Day ${day}</span>
      <div class="day-line"></div>
      <span style="color:var(--text-muted);font-size:10px;">${dayStops.length} stops</span>
    `;
    list.appendChild(hdr);

    dayStops.sort((a,b) => a.stop - b.stop).forEach(stop => {
      const card = document.createElement('div');
      card.className = `stop-card day${stop.day}`;
      card.id = `card-${stop.id}`;
      const isMulti = stop.projects.length > 1;
      const contractors = [...new Set(stop.projects.map(p => p.contractor).filter(Boolean))];
      card.innerHTML = `
        <div class="stop-num">Stop ${stop.stop} · ${stop.arrivalTime}</div>
        <div class="stop-name">${stop.name}</div>
        <div class="stop-address">${stop.projects[0].address}</div>
        <div class="stop-tags">
          ${contractors.slice(0,1).map(c => `<span class="tag tag-contractor">${c.length > 28 ? c.slice(0,28)+'…' : c}</span>`).join('')}
          ${isMulti ? `<span class="tag tag-multi">${stop.projects.length} projects</span>` : ''}
        </div>
      `;
      card.onclick = () => { showDetail(stop.id); scrollToMarker(stop); };
      list.appendChild(card);
    });
  });
}

// ── DETAIL PANEL ──────────────────────────────────────────────────────────────
let activeId = null;

function showDetail(id) {
  const stop = stops.find(s => s.id === id);
  if (!stop) return;
  activeId = id;

  // Highlight card
  document.querySelectorAll('.stop-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById(`card-${id}`);
  if (card) { card.classList.add('active'); card.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }

  const color = stop.day === 1 ? '#f5a623' : '#38bdf8';
  const panel = document.getElementById('detailPanel');

  document.getElementById('dpBadge').textContent = `Day ${stop.day} · Stop ${stop.stop}`;
  document.getElementById('dpBadge').style.background = `${color}22`;
  document.getElementById('dpBadge').style.color = color;
  document.getElementById('dpName').textContent = stop.name;

  let html = `
    <div class="detail-row">
      <div class="detail-label">Arrival</div>
      <div class="detail-value highlight">${stop.arrivalTime}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Coords</div>
      <div class="detail-value" style="font-size:11px;color:var(--text-muted)">${stop.lat.toFixed(4)}, ${stop.lng.toFixed(4)}</div>
    </div>
  `;

  if (stop.projects.length === 1) {
    const p = stop.projects[0];
    html += `
      <div class="detail-row"><div class="detail-label">Project</div><div class="detail-value">${p.title}</div></div>
      <div class="detail-row"><div class="detail-label">Contractor</div><div class="detail-value">${p.contractor || '—'}</div></div>
      <div class="detail-row"><div class="detail-label">Address</div><div class="detail-value" style="font-size:11px">${p.address}</div></div>
      <div class="detail-row"><div class="detail-label">Bid Date</div><div class="detail-value">${p.bidDate}</div></div>
      <div class="detail-row"><div class="detail-label">Record ID</div><div class="detail-value" style="color:var(--text-muted)">#${p.id}</div></div>
    `;
  } else {
    html += `<div class="multi-badge">${stop.projects.length} projects at this location</div>`;
    html += `<div class="project-list">`;
    stop.projects.forEach(p => {
      html += `
        <div class="project-item">
          <div class="project-item-name">${p.title}</div>
          <div class="project-item-detail">Contractor: ${p.contractor || '—'}</div>
          <div class="project-item-detail">Bid Date: ${p.bidDate} · ID #${p.id}</div>
        </div>
      `;
    });
    html += `</div>`;
  }

  document.getElementById('dpBody').innerHTML = html;
  panel.classList.add('visible');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('visible');
  document.querySelectorAll('.stop-card').forEach(c => c.classList.remove('active'));
  activeId = null;
}

function scrollToMarker(stop) {
  map.setView([stop.lat, stop.lng], 12, { animate: true });
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
let currentDayFilter = 'all';
let currentSearch = '';

function filterDay(day) {
  currentDayFilter = day;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  if (day === 'all') document.querySelector('.day-btn.all').classList.add('active');
  else document.querySelector(`.day-btn.d${day}`).classList.add('active');

  // Show/hide markers
  stops.forEach(stop => {
    const m = markers[stop.id];
    if (!m) return;
    if (day === 'all' || stop.day === day) {
      if (!markerLayer.hasLayer(m)) markerLayer.addLayer(m);
    } else {
      markerLayer.removeLayer(m);
    }
  });

  buildSidebar(currentDayFilter, currentSearch);
}

function filterSearch(val) {
  currentSearch = val;
  buildSidebar(currentDayFilter, currentSearch);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildSidebar();
</script>
